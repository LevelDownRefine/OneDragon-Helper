name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: OneDragon-ScriptChainer/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: OneDragon-ScriptChainer/.python-version

      - name: Run tests
        working-directory: OneDragon-ScriptChainer
        run: uv run python -m unittest discover -s ../tests -v
