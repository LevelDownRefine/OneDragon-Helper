# 各自动化脚本支持的副本列表
# key: 脚本 display_name（与 config.yml 中对应）
# value: 结构化配置（见下方格式说明）

# 配置格式（结构化）：
# dungeons:
#   - name: "副本名称"                    # 一级选项名称
#   - name: "有二级选项的副本"
#     sequences:                          # 二级选项（可选）
#       - display: "显示名称"              # 界面显示的友好名称
#         value: 实际值                    # 保存和传递给 set_config 的值

